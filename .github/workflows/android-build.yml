name: Android APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build APK
        run: |
          echo "APK Build Started"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: .
